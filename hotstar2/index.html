<script>
    // --- 5 MINUTE REFRESH ADDED HERE ---
    setTimeout(function() {
        location.reload();
    }, 300000);
    // -----------------------------------

    const PROXY = "https://sony-liv-proxyb.wasmer.app/stream_proxy.php?url=";

    function getParam(n) { return new URLSearchParams(location.search).get(n); }

    let finalURL = getParam('url');
    const channel = 'sgsafsfsfsfsfs';

    // Kick API JSON fetch
    async function fetchKickM3U8(channelName){
        const endpoint = "https://kick.com/api/v2/channels/" + encodeURIComponent(channelName);
        try {
            const res = await fetch(endpoint);
            const data = await res.json();
            if (!data.livestream) return null;
            const realURL = data.playback_url;
            return PROXY + encodeURIComponent(realURL);
        } catch(e){ return null; }
    }

    // Kick channel requested
    if(channel && !finalURL){
        fetchKickM3U8(channel).then(url => {
            if(!url){
                document.getElementById("loadingScreen").innerHTML =
                    "<h2 style='color:white;text-align:center;'>Kick Fetch Failed</h2>";
            } else {
                location.href = location.pathname + "?url=" + encodeURIComponent(url);
            }
        });
    }

    if(!finalURL){
        document.getElementById("loadingScreen").innerHTML =
            "<h2 style='color:white;text-align:center;'>loading..</h2>";
        throw new Error("loading..");
    }

    if(!finalURL.startsWith(PROXY)){
        finalURL = PROXY + encodeURIComponent(finalURL);
    }

    const video = document.getElementById('player');

    if(Hls.isSupported()){
        const hls = new Hls();
        hls.loadSource(finalURL);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            const availableLevels = hls.levels;
            const availableQualities = Array.from(new Set(
                availableLevels.map(l => l.height)
            )).sort((a,b)=>a-b);

            const qualityOptions = [...availableQualities, 'auto'];
            let currentQuality = 'auto';

            const player = new Plyr(video, {
                autoplay: true,
                muted: true,
                controls: ['play','progress','current-time','mute','volume','settings','fullscreen'],
                settings: ['quality'],
                quality: {
                    default: 'auto',
                    options: qualityOptions,
                    forced: true,
                    onChange: q => {
                        if(q === 'auto'){
                            hls.currentLevel = -1;
                            currentQuality = 'auto';
                        } else {
                            const index = hls.levels.findIndex(l => l.height === parseInt(q));
                            hls.currentLevel = index;
                            currentQuality = parseInt(q);
                        }
                    }
                }
            });

            player.config.i18n.quality = {
                auto: 'Auto',
                ...Object.fromEntries(availableQualities.map(q => [q, `${q}p`]))
            };

            Object.defineProperty(player, 'quality', {
                get: ()=>currentQuality,
                set: q=>player.config.quality.onChange(q)
            });

            player.quality = 'auto';

            // Unmute fix on first interaction
            video.muted = false;
            video.play().catch(()=>{
                const handler = () => {
                    video.play();
                    video.muted = false;
                    document.removeEventListener('click', handler);
                };
                document.addEventListener('click', handler);
            });

            // Hide loading screen like JW Player
            document.getElementById("loadingScreen").style.display = "none";
        });

        // Error handling
        hls.on(Hls.Events.ERROR, () => {
            document.getElementById("loadingScreen").innerHTML =
                "<h2 style='color:white;text-align:center;'>Error Loading Stream</h2>";
        });

    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
        video.src = finalURL;
        new Plyr(video, { autoplay: true, muted: true, controls: ['play','progress','current-time','mute','volume','fullscreen'] });
        video.onloadedmetadata = () => {
            document.getElementById("loadingScreen").style.display = "none";
        };
    } else {
        document.getElementById("loadingScreen").innerHTML =
            "<h2 style='color:white;text-align:center;'>HLS Not Supported</h2>";
    }
</script>
